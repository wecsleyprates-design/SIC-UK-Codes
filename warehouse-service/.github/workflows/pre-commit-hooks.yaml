name: Pre-Commit Hooks

on: [push]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.12.4"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pip install poetry
          poetry install
          pre-commit install

      - name: Run Trailing Whitespace Fixer
        run: pre-commit run trailing-whitespace --all-files

      - name: Run Requirements.txt Fixer
        run: pre-commit run requirements-txt-fixer --all-files

      - name: Run End of File Fixer
        run: pre-commit run end-of-file-fixer --all-files

      - name: Run YAML Integrity Checker
        run: pre-commit run check-yaml --all-files

      - name: Run JSON Integrity Checker
        run: pre-commit run check-json --all-files

      - name: Upgrade Type Hints
        run: pre-commit run upgrade-type-hints --all-files

      - name: Run Black Formatter
        run: pre-commit run black --all-files

      - name: Run isort
        run: pre-commit run isort --all-files

      - name: Run Flake8 Lint
        run: pre-commit run flake8 --all-files
